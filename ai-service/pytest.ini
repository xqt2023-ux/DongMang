[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=app
    --cov-report=xml
    --cov-report=term
    --cov-fail-under=10
markers =
    asyncio: mark test as async
    unit: unit tests
    integration: integration tests
    slow: slow running tests
